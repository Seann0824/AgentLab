# agent-lab 权限沙箱配置
# ============================================
# 此配置文件用于自定义权限规则。
# 默认配置已内嵌在代码中（PermissionConfig::default_for_project），
# 此文件中的规则会覆盖默认规则。
#
# 支持的规则类型：
# - [[path_rules]]        路径白名单/黑名单
# - [[command_rules]]      命令黑名单/白名单
# - [[sensitive_file_rules]] 敏感文件保护
#
# 如需自定义规则，取消下方对应部分的注释并修改即可。
# ============================================

version = "1.0"
project_root = "/Users/sean/Desktop/repo/agent-lab"

# ─── 路径白名单 ──────────────────────────────
# Agent 只能在这些路径下操作文件
# 默认已经允许项目目录，如需额外放行其他目录可在此添加

# [[path_rules]]
# action = "Allow"
# pattern = "/Users/sean/Desktop/repo/agent-lab/**"
# description = "项目目录"

# [[path_rules]]
# action = "Allow"
# pattern = "/tmp/agent-*/**"
# description = "临时文件目录"

# ─── 命令黑名单 ──────────────────────────────
# 这些命令默认禁止执行。如需放行某些命令，可以：
# 1. 将 action 改为 "Allow"
# 2. 或者添加新的 Allow 规则覆盖

# sudo - 禁止提权
# [[command_rules]]
# action = "Deny"
# pattern = "sudo"
# description = "禁止使用 sudo 提升权限"

# ─── 敏感文件保护 ─────────────────────────────
# 这些文件禁止读写。如需放行，可以将 read_allowed / write_allowed 改为 true

# [[sensitive_file_rules]]
# action = "Deny"
# pattern = "**/.env"
# read_allowed = false
# write_allowed = false
# description = "环境变量文件（含 API Key）"

# ─── 网络规则 ────────────────────────────────
# 默认禁止所有外部网络请求。
# 如需放行特定 API，取消下方注释并修改：

# [[network_rules]]
# action = "Allow"
# pattern = "https://api.deepseek.com"
# description = "DeepSeek API 调用"
